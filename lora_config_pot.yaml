# Tagzeit PoT — SmolLM2-135M LoRA Config (MLX)
# Phase 0: Proof of Technology on M4 Mac

model: "HuggingFaceTB/SmolLM2-135M"
data: "data"
# valid_data is inferred if data is a directory
adapter_file: "adapters_pot.npz"

# Training
batch_size: 4
iters: 1000
val_batches: 25
steps_per_report: 10
steps_per_eval: 100
save_every: 200

# LoRA
lora_layers: 16
lora_rank: 8
learning_rate: 1.0e-4

# Context
max_seq_length: 512
