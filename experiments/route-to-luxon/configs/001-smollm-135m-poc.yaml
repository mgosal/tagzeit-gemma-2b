# SmolLM-135M Route-to-Luxon PoC Config
# Experiment 001: Pipeline validation

model: "HuggingFaceTB/SmolLM-135M"
train_file: "data/train/train_routed.jsonl"
eval_file: "data/eval/eval_routed.jsonl"

# Training
batch_size: 2
gradient_accumulation_steps: 4
max_steps: 250
warmup_steps: 100
learning_rate: 3.0e-4
lr_scheduler_type: cosine
weight_decay: 0.01
optimizer: adamw_torch

# Precision
dtype: float32
fp16: false
bf16: false

# SFT
max_length: 256
packing: true

# Domain tokens
domain_tokens: 104
geometric_init: true

# Reproducibility
seed: 3407
