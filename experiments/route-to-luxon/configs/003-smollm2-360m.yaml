# SmolLM2-360M Route-to-Luxon Full Fine-Tune Config
# Experiment 003: Full fine-tune scale-up (no LoRA)

model: "HuggingFaceTB/SmolLM2-360M-Instruct"
train_file: "data/train/train_routed.jsonl"
eval_file: "data/eval/eval_routed.jsonl"
output_dir: "experiments/route-to-luxon/weights/003-smollm2-360m"

# Training
batch_size: 2
gradient_accumulation_steps: 4
max_steps: 500
warmup_steps: 100
learning_rate: 3.0e-4
lr_scheduler_type: cosine
weight_decay: 0.01
optimizer: adamw_torch

# Precision
dtype: float32
fp16: false
bf16: false

# SFT
max_length: 256
packing: true

# No LoRA — full fine-tune
lora_enabled: false

# Domain tokens
domain_tokens: 104
geometric_init: true

# Reproducibility
seed: 3407
